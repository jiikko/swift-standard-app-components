name: Test

on:
  push:
    branches: [master]
    paths:
      - "Sources/**/*.swift"
      - "Tests/**/*.swift"
      - "Package.swift"
      - "Package.resolved"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "Sources/**/*.swift"
      - "Tests/**/*.swift"
      - "Package.swift"
      - "Package.resolved"
      - ".github/workflows/test.yml"

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # macOS runner を使う理由: SwiftUI / AppKit に依存する Sources をビルドするため。
    # 本リポは public なので macOS runner は無料 (.claude/rules/gha-runner.md 参照)。
    runs-on: macos-15

    # 複数 Swift / Xcode バージョンで並行テスト。consumer アプリも複数のツール
    # チェーンで使われるので、ライブラリ側で「ビルド可能な範囲」を担保する。
    #
    # GHA macOS runner にプリインストールされた Xcode しか使えない (新しすぎる
    # 版は `Could not find Xcode version` で落ちる) ので、`latest-stable` と
    # 「16 系の最新」を試す。runner image が更新されると順次新しい組み合わせ
    # に追従する。
    strategy:
      fail-fast: false  # 1 つの組み合わせで落ちても他のテストは続ける
      matrix:
        xcode:
          - latest-stable  # runner にある最新 stable (現状 26.x or 16.x のどちらか)
          - "16.4"         # Xcode 16 系の latest stable

    name: swift test (Xcode ${{ matrix.xcode }})

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ matrix.xcode }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}

      - name: Xcode / Swift version
        run: |
          xcodebuild -version
          swift --version

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: .build
          # matrix を含む cache key にして xcode 違いで cache 衝突しないようにする
          key: spm-${{ runner.os }}-xcode-${{ matrix.xcode }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-xcode-${{ matrix.xcode }}-

      - name: swift test
        run: swift test --parallel
