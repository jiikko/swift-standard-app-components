name: Test

on:
  push:
    branches: [master]
    paths:
      - "Sources/**/*.swift"
      - "Tests/**/*.swift"
      - "Package.swift"
      - "Package.resolved"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "Sources/**/*.swift"
      - "Tests/**/*.swift"
      - "Package.swift"
      - "Package.resolved"
      - ".github/workflows/test.yml"

# 同じブランチで連続 push されたら古い run はキャンセルする (macOS runner の
# キューを詰まらせない)。
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # macOS runner を使う理由: SwiftUI / AppKit に依存する Sources をビルド
    # するため。Linux runner では SwiftUI が import できず swift build から
    # 失敗する。本リポは public なので macOS runner は無料 (.claude/rules/gha-runner.md 参照)。
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      # Xcode の SDK / Swift toolchain を固定する。`maxim-lobanov/setup-xcode`
      # は xcode-select をラップした action で、runner にプリインストール
      # された中で指定したバージョンを解決する。
      # 26.4 固定の理由: ローカル開発が 26.4.1 で動作確認済みなので、
      # 同系列で揃える。`26.4` 表記は patch 違い (26.4.x) を許容する。
      - name: Select Xcode 26.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      - name: Xcode / Swift version
        run: |
          xcodebuild -version
          swift --version

      # Package.resolved を含めてキャッシュ。SPM dependency は SwiftLintPlugins
      # 等を含むため、初回 fetch が数十秒かかる。
      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      # `swift build` の段階で SwiftLintBuildToolPlugin が動くため、ここで
      # lint 違反 (error 昇格分) も検出される。Linux 側の swiftlint.yml と
      # 役割が重複するが、macOS 側の SDK でビルドできる方が確実。
      - name: swift test
        run: swift test --parallel
