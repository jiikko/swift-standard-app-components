name: Test

on:
  push:
    branches: [master]
    paths:
      - "Sources/**/*.swift"
      - "Tests/**/*.swift"
      - "Package.swift"
      - "Package.resolved"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "Sources/**/*.swift"
      - "Tests/**/*.swift"
      - "Package.swift"
      - "Package.resolved"
      - ".github/workflows/test.yml"

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # macOS runner を使う理由: SwiftUI / AppKit に依存する Sources をビルドするため。
    # 本リポは public なので macOS runner は無料 (.claude/rules/gha-runner.md 参照)。
    runs-on: macos-15

    # Xcode = Swift toolchain (macOS では一体) なので、Xcode を matrix に
    # することが実質的な Swift バージョン matrix になる。現状は 26 系のみを
    # サポート対象とする (Xcode 16 系は consumer アプリで実用されておらず、
    # 16.4 で swift test が落ちることも確認済み)。
    #
    # 将来 27 系や 26 系の新マイナーが出た時にここに追加する。
    strategy:
      fail-fast: false
      matrix:
        xcode:
          - latest-stable  # runner にある最新 stable (現状 26.x)

    name: swift test (Xcode ${{ matrix.xcode }})

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ matrix.xcode }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}

      - name: Xcode / Swift version
        run: |
          xcodebuild -version
          swift --version

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: .build
          # matrix を含む cache key にして xcode 違いで cache 衝突しないようにする
          key: spm-${{ runner.os }}-xcode-${{ matrix.xcode }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-xcode-${{ matrix.xcode }}-

      - name: swift test
        run: swift test --parallel
