name: Test

on:
  push:
    branches: [master]
    paths:
      - "Sources/**/*.swift"
      - "Tests/**/*.swift"
      - "Package.swift"
      - "Package.resolved"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "Sources/**/*.swift"
      - "Tests/**/*.swift"
      - "Package.swift"
      - "Package.resolved"
      - ".github/workflows/test.yml"

# 同じブランチで連続 push されたら古い run はキャンセルする (macOS runner の
# キューを詰まらせない)。
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # macOS runner を使う理由: SwiftUI / AppKit に依存する Sources をビルド
    # するため。Linux runner では SwiftUI が import できず swift build から
    # 失敗する。本リポは public なので macOS runner は無料 (.claude/rules/gha-runner.md 参照)。
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      # Xcode の SDK / Swift toolchain を選ぶ。`maxim-lobanov/setup-xcode` は
      # xcode-select をラップした action で、runner にプリインストールされた
      # 中で指定バージョンを解決する。
      #
      # 過去の試行: `'26.4'` 固定を試したが、GHA macOS runner に該当 Xcode が
      # プリインストールされていないため "Could not find Xcode version that
      # satisfied version spec" で失敗。runner image の更新サイクルがローカル
      # Xcode (26.4.1 が出ている) より遅いことが理由。
      #
      # 選択肢として `latest-stable` を採用。runner-image が更新されると自動
      # 追従する。ライブラリ側で SDK 依存の最新追従が崩れていないかを早期
      # 検出する役割も果たせる。
      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Xcode / Swift version
        run: |
          xcodebuild -version
          swift --version

      # Package.resolved を含めてキャッシュ。SPM dependency は SwiftLintPlugins
      # 等を含むため、初回 fetch が数十秒かかる。
      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      # `swift build` の段階で SwiftLintBuildToolPlugin が動くため、ここで
      # lint 違反 (error 昇格分) も検出される。Linux 側の swiftlint.yml と
      # 役割が重複するが、macOS 側の SDK でビルドできる方が確実。
      - name: swift test
        run: swift test --parallel
